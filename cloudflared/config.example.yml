tunnel: <YOUR_TUNNEL_UUID>
credentials-file: /etc/cloudflared/<YOUR_TUNNEL_UUID>.json

# Keep this file aligned with the values in your .env:
# - hostname should match the host part of PUBLIC_BASE_URL
# - service should point to http://HOST:PORT
ingress:
  - hostname: <YOUR_PUBLIC_HOSTNAME>
    service: http://<TERM_GATEWAY_HOST>:<TERM_GATEWAY_PORT>
  - service: http_status:404
